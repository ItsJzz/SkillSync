<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkillSync - Admin Dashboard</title>
  <link rel="shortcut icon" sizes="32x32" href="LOGO.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      background-color: #f7f9fb;
      color: #2c3e50;
    }
    .sidebar {
      width: 240px;
      background-color: #ffffff;
      border-right: 1px solid #e0e0e0;
      height: 100vh;
      padding: 20px 0;
      position: fixed;
      display: flex;
      flex-direction: column;
      
      justify-content: space-between;
    }
    .sidebar-content a {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #2c3e50;
      padding: 12px 20px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.3s;
    }
    .sidebar-content a:hover {
      background-color: #f0f0f0;
      border-left: 4px solid #27ae60;
    }
    .sidebar .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .sidebar .logo img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
    }
    .sidebar .logo h2 {
      font-size: 18px;
      color: #27ae60;
      margin-top: 10px;
    }
    .admin-info {
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }
    .admin-info img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-bottom: 5px;
    }
    .main-content {
      margin-left: 240px;
      padding: 30px;
      width: calc(100% - 240px);
    }
    .kpi-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .kpi {
      background-color: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      text-align: center;
    }
    .kpi h4 {
      margin-top: 10px;
      font-size: 16px;
      color: #888;
    }
    .kpi p {
      font-size: 22px;
      font-weight: bold;
      color: #27ae60;
    }
    .section {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      margin-bottom: 20px;
    }
    .section h3 {
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th {
      background-color: #f9f9f9;
      color: #666;
    }
    canvas {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div>
      <div class="logo">
        <img src="LOGO.png" alt="Logo">
        <h2>SkillSync Admin</h2>
      </div>
      <div class="sidebar-content">
        <a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="admin-students.html"><i class="fas fa-users"></i> Manage Students</a>
        <a href="admin-view-progress.html"><i class="fas fa-chart-bar"></i> View Progress</a>
        <a href="admin-recommendation.html"><i class="fas fa-brain"></i> Recommendations</a>
        <a href="admin_feedback_view.html"><i class="fas fa-clipboard-list"></i> View Feedback</a>
        <a href="admin-settings.html"><i class="fas fa-cog"></i> Settings</a>
        <a href="Homepage.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
    <div class="admin-info">
      <img src="profile.jpg" alt="Admin">
      <div><strong>Admin</strong></div>
      <div>jonhnelle@gmail.com</div>
    </div>
  </div>

  <div class="main-content">
    <div class="kpi-cards">
      <div class="kpi">
        <i class="fas fa-user-graduate fa-2x"></i>
        <h4>Total Students</h4>
        <p>0</p>
      </div>
      <div class="kpi">
        <i class="fas fa-percentage fa-2x"></i>
        <h4>Avg Skill Score</h4>
        <p>0%</p>
      </div>
      <div class="kpi">
        <i class="fas fa-exclamation-triangle fa-2x"></i>
        <h4>At-Risk</h4>
        <p>0</p>
      </div>
      <div class="kpi">
        <i class="fas fa-edit fa-2x"></i>
        <h4>Quizzes</h4>
        <p>0</p>
      </div>
    </div>

    <div class="section">
      <h3>Students At Risk</h3>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Skill Score</th>
            <th>Weak Areas</th>
          </tr>
        </thead>
        <tbody>
          <!-- Filled by JS -->
        </tbody>
      </table>
    </div>

    <div class="section">
      <h3>Weekly Engagement Overview</h3>
      <canvas id="engagementChart" height="100"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const grades = JSON.parse(localStorage.getItem("grades") || "[]");

    const uniqueStudents = [...new Set(grades.map(g => g.name))];
    const totalStudents = uniqueStudents.length;
    const totalGrades = grades.reduce((sum, g) => sum + g.grade, 0);
    const avgSkillScore = grades.length ? (totalGrades / grades.length).toFixed(1) : 0;

    const studentData = {};
    grades.forEach(g => {
      if (!studentData[g.name]) {
        studentData[g.name] = { email: "", scores: [], weakAreas: new Set() };
      }
      studentData[g.name].scores.push(g.grade);
      if (g.grade < 75) {
        studentData[g.name].weakAreas.add(g.topic);
      }
    });

    const atRisk = Object.entries(studentData)
      .filter(([_, data]) => data.scores.some(score => score < 75))
      .map(([name, data]) => ({
        name,
        email: `${name.toLowerCase().replace(/ /g, '')}@example.com`,
        avg: (data.scores.reduce((a, b) => a + b, 0) / data.scores.length).toFixed(0),
        weakAreas: [...data.weakAreas].join(", ")
      }));

    // Update KPI Cards
    document.querySelectorAll(".kpi")[0].querySelector("p").textContent = totalStudents;
    document.querySelectorAll(".kpi")[1].querySelector("p").textContent = `${avgSkillScore}%`;
    document.querySelectorAll(".kpi")[2].querySelector("p").textContent = atRisk.length;
    document.querySelectorAll(".kpi")[3].querySelector("p").textContent =
      grades.filter(g => g.activity.toLowerCase() === 'quiz').length;

    // At-Risk Table
    const tbody = document.querySelector(".section table tbody");
    tbody.innerHTML = atRisk.length
      ? atRisk.map(s => `
        <tr>
          <td>${s.name}</td>
          <td>${s.email}</td>
          <td>${s.avg}%</td>
          <td>${s.weakAreas}</td>
        </tr>`).join('')
      : `<tr><td colspan="4">No at-risk students.</td></tr>`;

    // Bar Chart Data
    const daysOfWeek = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
    const activityCount = [0, 0, 0, 0, 0];
    const quizCount = [0, 0, 0, 0, 0];
    const videoCount = [0, 0, 0, 0, 0];

    grades.forEach(g => {
      const date = new Date(g.date);
      const day = date.getDay();
      if (day >= 1 && day <= 5) {
        const i = day - 1;
        const type = g.activity.toLowerCase();
        if (type === "activity") activityCount[i]++;
        else if (type === "quiz") quizCount[i]++;
        else if (type === "video") videoCount[i]++;
      }
    });

    const ctx = document.getElementById('engagementChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: daysOfWeek,
        datasets: [
          {
            label: 'Activities',
            data: activityCount,
            backgroundColor: '#3498db'
          },
          {
            label: 'Quizzes',
            data: quizCount,
            backgroundColor: '#e67e22'
          },
          {
            label: 'Videos Watched',
            data: videoCount,
            backgroundColor: '#2ecc71'
          }
        ]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  </script>
</body>
</html>
